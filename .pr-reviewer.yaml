# pr-reviewer config — controls how the bot posts reviews on this repo's PRs.
#
# Schema:
#   autoApprove: bool (default false when this file is absent or the field is unset)
#
# When autoApprove is true:
#   - verdict "approve"        → posts as APPROVE (counts toward branch-protection
#                                reviewer gates ONLY if the App has Contents: Read & Write
#                                — see [[GitHub Repository Configuration Guide]] §
#                                "GitHub Apps as Approvers")
#   - verdict "request-changes" → posts as REQUEST_CHANGES (always)
#
# When autoApprove is false (or this file absent):
#   - verdict "approve"        → demoted to COMMENT with body prefix
#                                "auto-approve disabled for this repo, review submitted as comment"
#   - verdict "request-changes" → posts as REQUEST_CHANGES (always)
#
# Branch-protection consideration: if this repo has branch protection requiring N approvals,
# the bot's APPROVE counts toward that N. Combine with required human reviewers if you want
# a human gate in addition to the bot.

autoApprove: true
